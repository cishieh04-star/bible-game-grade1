<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聖經拼音遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'PingFang TC', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fdf6e3; padding: 5px; margin: 0; min-height: 100vh; }
        .card { width: 100%; max-width: 500px; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .yt-link { display: inline-block; margin: 5px 0; padding: 6px 12px; background: #FF0000; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .target-word { font-size: 40px; color: #5d4037; margin: 5px 0; font-weight: bold; }
        .zhuyin-slots { display: flex; gap: 3px; justify-content: center; margin: 10px 0; height: 35px; }
        .slot { width: 35px; height: 35px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: #fffdf0; }
        
        .options { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 15px; }
        .btn { padding: 6px; border: 2px solid #8b4513; border-radius: 8px; font-size: 16px; cursor: pointer; background: white; min-width: 45px; height: 45px; }
        .btn-tone { background-color: #e1f5fe; font-size: 20px; font-weight: bold; }
        .btn-fixed { background-color: #f0e68c; font-size: 14px; }
        
        #restart-btn { margin-top: 10px; padding: 8px 16px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; display: none; }
        #timer { font-size: 14px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <h1>聖經拼音遊戲</h1>
    <p>我們愛，因為神先愛我們。</p>
    <button style="padding: 15px 30px; font-size: 20px; background: #2e7d32; color: white; border: none; border-radius: 10px; cursor: pointer;" onclick="startGame()">開始挑戰</button>
</div>

<div class="card" id="game-screen" style="display:none;">
    <a href="https://www.youtube.com/shorts/i9sHKyIlAIc" target="_blank" class="yt-link">🎥 觀看複習影片</a>
    <div id="timer">時間: 0秒</div>
    <div style="font-size: 13px; font-weight: bold; color: #5d4037; margin-top: 5px;">我們愛，因為神先愛我們。(約翰一書 4:19)</div>
    <div class="target-word" id="char-display"></div>
    <div class="zhuyin-slots" id="zhuyin-slots">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
    <div class="options" id="options"></div>
    <button id="restart-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const scriptFlow = [
        { char: "我", components: ["ㄨ", "ㄛ", "ˇ", " "] }, { char: "們", components: ["ㄇ", "ㄣ", "˙", " "] },
        { char: "愛", components: ["ㄞ", "ˋ", " ", " "] }, { char: "因", components: ["ㄧ", "ㄣ", " ", " "] },
        { char: "為", components: ["ㄨ", "ㄟ", "ˋ", " "] }, { char: "神", components: ["ㄕ", "ㄣ", "ˊ", " "] },
        { char: "先", components: ["ㄒ", "ㄧ", "ㄢ", " "] }, { char: "愛", components: ["ㄞ", "ˋ", " ", " "] },
        { char: "我", components: ["ㄨ", "ㄛ", "ˇ", " "] }, { char: "們", components: ["ㄇ", "ㄣ", "˙", " "] }
    ];

    // 固定選項清單 (正確答案 + 少量干擾項)
    const fixedOptions = ["空格", "˙", "ˊ", "ˇ", "ˋ", "ㄨ", "ㄛ", "ㄇ", "ㄣ", "ㄞ", "ㄧ", "ㄟ", "ㄕ", "ㄒ", "ㄢ"];

    let currentIdx = 0, slotIdx = 0, currentInput = ["", "", "", ""], seconds = 0, timerInterval;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        timerInterval = setInterval(() => { seconds++; document.getElementById('timer').textContent = "時間: " + seconds + "秒"; }, 1000);
        loadStep();
    }

    function loadStep() {
        document.getElementById('char-display').textContent = scriptFlow[currentIdx].char;
        resetInput(); renderButtons();
    }

    function renderButtons() {
        const optionsDiv = document.getElementById('options'); optionsDiv.innerHTML = '';
        
        fixedOptions.forEach(op => {
            const btn = document.createElement('button');
            // 設定按鈕類別
            if (op === "空格") btn.className = 'btn btn-fixed';
            else if (["˙", "ˊ", "ˇ", "ˋ"].includes(op)) btn.className = 'btn btn-tone';
            else btn.className = 'btn';
            
            btn.textContent = op;
            btn.onclick = () => handleInput(op === "空格" ? " " : op);
            optionsDiv.appendChild(btn);
        });
    }

    function handleInput(val) {
        if (slotIdx < 4 && val === scriptFlow[currentIdx].components[slotIdx]) {
            currentInput[slotIdx] = val; updateSlots(); slotIdx++;
            if (slotIdx === 4) {
                confetti({ particleCount: 80, spread: 50, origin: { y: 0.6 } });
                const msg = new SpeechSynthesisUtterance("太棒了");
                msg.lang = 'zh-TW'; window.speechSynthesis.speak(msg);
                setTimeout(() => {
                    if (currentIdx === scriptFlow.length - 1) {
                        clearInterval(timerInterval);
                        document.getElementById('restart-btn').style.display = 'inline-block';
                        document.getElementById('options').style.display = 'none';
                        window.open("https://www.youtube.com/shorts/i9sHKyIlAIc", "_blank");
                    } else { currentIdx++; loadStep(); }
                }, 800);
            }
        } else if (slotIdx < 4) { alert("錯誤！"); resetInput(); }
    }

    function updateSlots() { document.querySelectorAll('.slot').forEach((s, i) => s.textContent = currentInput[i] === " " ? "＿" : currentInput[i]); }
    function resetInput() { currentInput = ["", "", "", ""]; slotIdx = 0; updateSlots(); }
</script>
</body>
</html>
